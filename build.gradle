repositories {
    mavenCentral()
    google()
}

apply plugin: "java-library"
apply plugin: "eclipse"
apply plugin: "idea"

dependencies {
    implementation 'com.formdev:flatlaf:1.6.5'
}

compileJava {
    options.release = 11
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(11)
    }
}

dependencies {
    //NONE
}

project.ext.appName = "PokeMMO"
project.ext.mainClassName = "com.pokeemu.unix.UnixInstaller"
project.ext.mainJar = "unix-installer.jar"

task getDeps(type: Copy) {
    from sourceSets.main.runtimeClasspath
    into 'runtime/'

    doFirst {
        ant.delete(dir: 'runtime')
        ant.mkdir(dir: 'runtime')
    }

    doLast {
        ant.delete(dir: 'runtime')
    }
}


jar {
  archiveFileName = project.mainJar

  duplicatesStrategy = DuplicatesStrategy.EXCLUDE

  manifest {
    attributes(
      'Main-Class': project.mainClassName
    )
  }
}

task distJar(type: GradleBuild) {
    buildName "distJar"
    startParameter.projectProperties = gradle.startParameter.projectProperties
    tasks = ['clean', 'jar']
}

assemble.dependsOn distJar
